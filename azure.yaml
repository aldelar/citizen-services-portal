# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: citizen-services-portal
metadata:
    template: citizen-services-portal@0.0.1
services:
    csp-agent:
        project: ./src/agents/csp-agent
        host: containerapp
        language: python
        docker:
            path: ./Dockerfile
            context: ../../..
    csp-web-app:
        project: ./src/web-app
        host: containerapp
        language: python
        docker:
            path: ./Dockerfile
            context: ../..
    mcp-ladbs:
        project: ./src/mcp-servers/ladbs
        host: containerapp
        language: python
        docker:
            path: ./Dockerfile
            context: ../../..
    mcp-ladwp:
        project: ./src/mcp-servers/ladwp
        host: containerapp
        language: python
        docker:
            path: ./Dockerfile
            context: ../../..
    mcp-lasan:
        project: ./src/mcp-servers/lasan
        host: containerapp
        language: python
        docker:
            path: ./Dockerfile
            context: ../../..
    mcp-csp:
        project: ./src/mcp-servers/csp
        host: containerapp
        language: python
        docker:
            path: ./Dockerfile
            context: ../../..
infra:
    provider: bicep
    path: infra
    module: main
pipeline:
    provider: github
    variables: []
    secrets: []
hooks:
    postdeploy:
        posix:
            shell: sh
            run: |
                echo "CSP Agent deployed as Azure Container App via azd deploy"
    postprovision:
        posix:
            shell: sh
            run: |
                echo "Skipping AI Gateway configuration (deferred to APIM implementation)"

                echo ""
                echo "Setting up CosmosDB RBAC for local development..."
                cd ../.. && ./scripts/setup-dev-rbac.sh || echo "Note: RBAC setup skipped (may already be configured)"
    preprovision:
        posix:
            name: preprovision
            shell: sh
            run: |
                # Automatically set the current user's principal ID for RBAC assignments
                PRINCIPAL_ID=$(az ad signed-in-user show --query id -o tsv 2>/dev/null || echo "")
                if [ -n "$PRINCIPAL_ID" ]; then
                  azd env set AZURE_PRINCIPAL_ID "$PRINCIPAL_ID"
                  echo "Set AZURE_PRINCIPAL_ID to $PRINCIPAL_ID"
                else
                  echo "Warning: Could not get user principal ID. RBAC assignment will be skipped."
                fi

                # Automatically set developer IP for Cosmos DB firewall
                DEV_IP=$(curl -s https://ifconfig.me 2>/dev/null || echo "")
                if [ -n "$DEV_IP" ]; then
                  azd env set DEVELOPER_IP_ADDRESS "$DEV_IP"
                  echo "Set DEVELOPER_IP_ADDRESS to $DEV_IP"
                else
                  echo "Warning: Could not detect developer IP. Cosmos DB firewall will not include dev IP."
                fi
