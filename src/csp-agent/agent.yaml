# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: CSPAgent
description: "Citizen Services Portal Agent - A unified AI assistant for City of Los Angeles \ngovernment services. Connects to LADBS (Building & Safety), LADWP (Water & Power), \nLASAN (Sanitation), and Reporting MCP servers to provide intelligent citizen services \nwith multi-agency coordination.\n"
metadata:
    authors:
        - Citizen Services Portal Team
    example:
        - content: I want to install solar panels on my house. What permits do I need?
          role: user
    tags:
        - Azure AI AgentServer
        - Microsoft Agent Framework
        - Model Context Protocol
        - MCP
        - Citizen Services
        - Government
protocols:
    - protocol: responses
      version: v1
environment_variables:
    - name: AZURE_AI_PROJECT_ENDPOINT
      value: ${AZURE_AI_PROJECT_ENDPOINT}
    - name: AZURE_OPENAI_ENDPOINT
      value: ${AZURE_OPENAI_ENDPOINT}
    - name: AZURE_OPENAI_CHAT_DEPLOYMENT_NAME
      value: gpt-4.1
    - name: MCP_LADBS_URL
      value: ${MCP_LADBS_URL}
    - name: MCP_LADWP_URL
      value: ${MCP_LADWP_URL}
    - name: MCP_LASAN_URL
      value: ${MCP_LASAN_URL}
    - name: MCP_REPORTING_URL
      value: ${MCP_REPORTING_URL}
