name: mcp-ladbs
type: mcp
description: MCP server providing LADBS (Los Angeles Department of Building and Safety) tools
endpoint:
  url: https://aldelarcspcr.azurecr.io/mcp/v1/ladbs  # APIM endpoint
  authentication:
    type: subscription_key
    header: Ocp-Apim-Subscription-Key
tools:
  - submit_permit_application
  - check_permit_status
  - schedule_inspection
  - report_violation
