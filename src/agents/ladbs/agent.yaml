# Agent definition matching New Foundry portal schema
# This can be exported from portal and used as-is (or vice versa)

name: ladbs-assistant
description: AI assistant for Los Angeles Department of Building and Safety (LADBS) services

definition:
  kind: prompt
  model: gpt-4.1
  instructions: file://system-prompt.md
  temperature: 0.7
  tools:
    - type: mcp
      server_label: mcp-ladbs  # Must match azure.yaml service name
      server_url: ${SERVICE_MCP_LADBS_URI}/mcp
      project_connection_id: mcp-ladbs
      authentication:
        type: entra_agent_identity  # Use agent's identity for authentication
        scope: ${MCP_LADBS_SCOPE_URI}  # Default ACA audience for the MCP server
